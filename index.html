<!DOCTYPE html>
<html>
<head>

    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap-glyphicons.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.2.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/python-visualization/folium/folium/templates/leaflet.awesome.rotate.min.css"/>

    <meta name="viewport" content="width=device-width,
        initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        #map_7b78e732d0bc3efcd9d57fcf33eec995 {
            position: relative;
            width: 100.0%;
            height: 100.0%;
            left: 0.0%;
            top: 0.0%;
        }

        .leaflet-container {
            font-size: 1rem;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            position:absolute;
            top:0;
            bottom:0;
            right:0;
            left:0;
        }
    </style>

    <script>
        L_NO_TOUCH = false;
        L_DISABLE_3D = false;
    </script>

    <script src="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.0/Control.FullScreen.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.fullscreen@3.0.0/Control.FullScreen.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.66.2/L.Control.Locate.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-locatecontrol/0.66.2/L.Control.Locate.min.css"/>
</head>

<body>

<style>
  :root{
    --brand:#1f7ae0;
    --ok:#14a44d;
    --err:#c62828;
    --bg:#fff;
    --ink:#222;
    --muted:#6b7280;
    --radius:14px;
    --shadow:0 6px 24px rgba(0,0,0,.12);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b0f14;
      --ink:#e5e7eb;
      --muted:#9aa4b2;
    }
  }

  #code-panel{
    position:fixed;
    inset:12px 12px auto 12px;
    left:50%;
    transform:translateX(-50%);
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    z-index:9999;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  #kode{
    padding:10px 12px;
    min-width:180px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #cfd8dc;
  }

  #checkBtn{
    padding:10px 14px;
    border-radius:10px;
    border:0;
    cursor:pointer;
    font-weight:600;
    background:var(--brand);
    color:white;
  }

  #feedback{
    font-weight:600;
    min-width:200px;
  }

  .progress{
    width:100%;
    height:8px;
    background:rgba(0,0,0,.06);
    border-radius:999px;
    overflow:hidden;
  }

  .progress__bar{
    height:100%;
    width:0;
    background:var(--brand);
    transition:width .35s;
  }

  .pulse-marker .pin{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--brand);
    border:3px solid #fff;
    box-shadow:0 0 0 2px var(--brand);
  }

  .pulse-marker .pulse{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:14px;
    height:14px;
    border-radius:50%;
    border:2px solid var(--brand);
    opacity:.5;
    animation:pulse 1.8s infinite ease-out;
  }

  @keyframes pulse{
    0%{
      transform:translate(-50%,-50%) scale(.6);
      opacity:.9;
    }

    100%{
      transform:translate(-50%,-50%) scale(2.2);
      opacity:0;
    }
  }

  #start-gate{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    background:rgba(0,0,0,.55);
    z-index:10000;
  }

  .gate-card{
    background:var(--bg);
    color:var(--ink);
    width:min(520px,92vw);
    padding:22px;
    border-radius:16px;
    box-shadow:var(--shadow);
  }

  .gate-card h2{
    margin:0 0 8px;
  }

  .gate-card p{
    margin:0 0 14px;
    color:var(--muted);
  }

  .gate-card input{
    width:100%;
    padding:12px 14px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #cfd8dc;
  }

  .gate-card button{
    margin-top:12px;
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:0;
    background:var(--brand);
    color:white;
    font-weight:700;
  }

  .leaflet-popup-content{
    line-height:1.35;
    max-width:240px;
  }

  /* TWO TIMER BOXES */
  #timer-wrapper{
    position:fixed;
    top:12px;
    right:12px;
    z-index:10001;
    display:none;
    gap:10px;
    align-items:stretch;
  }

  .timer-box{
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    font-variant-numeric:tabular-nums;
    min-width:150px;
    text-align:center;
  }

  .timer-label{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  .timer-time{
    font-size:26px;
    line-height:1;
    font-weight:900;
  }

  .timer-buttons{
    margin-top:10px;
    display:flex;
    gap:8px;
    justify-content:center;
  }

  .timer-buttons button{
    border:0;
    border-radius:10px;
    padding:8px 10px;
    font-weight:800;
    cursor:pointer;
    background:var(--brand);
    color:white;
  }

  .timer-buttons button.minus{
    background:var(--err);
  }

  .timer-box.flash{
    animation:tflash .35s ease;
  }

  @keyframes tflash{
    from{
      transform:scale(1.06);
    }

    to{
      transform:scale(1);
    }
  }

  @media (max-width:700px){
    #timer-wrapper{
      top:auto;
      bottom:12px;
      right:12px;
      left:12px;
      justify-content:center;
    }

    .timer-box{
      min-width:0;
      width:50%;
      padding:10px;
    }

    .timer-time{
      font-size:22px;
    }
  }
</style>

<!-- Start-gate -->
<div id="start-gate" aria-modal="true" role="dialog">
  <div class="gate-card">
    <h2>Start adgang</h2>
    <p>Indtast start-kode for at åbne kortet.</p>

    <input id="startCode"
           type="text"
           inputmode="text"
           autocomplete="one-time-code"
           autocapitalize="off"
           autocorrect="off"
           spellcheck="false"
           placeholder="Startkode"
           autofocus />

    <button id="startBtn" type="button">Åbn</button>
    <p id="startMsg" style="color:var(--err); font-weight:600;"></p>
  </div>
</div>

<!-- Top-panel -->
<div id="code-panel" role="region" aria-label="Kodepanel">
  <label for="kode">Indtast kode:</label>

  <input id="kode"
         type="text"
         inputmode="text"
         autocomplete="one-time-code"
         autocapitalize="off"
         autocorrect="off"
         spellcheck="false"
         placeholder="Skriv kode"
         aria-describedby="feedback"
         enterkeyhint="done" />

  <button id="checkBtn" type="button" title="Tjek koden">Tjek kode</button>

  <span id="feedback" aria-live="polite"></span>

  <div class="progress" aria-hidden="true">
    <div class="progress__bar" id="progressBar"></div>
  </div>
</div>

<!-- TWO TIMERS -->
<div id="timer-wrapper" aria-live="polite">
  <div class="timer-box" id="adjustableTimerBox">
    <div class="timer-label">Justerbar tid</div>
    <div class="timer-time" id="adjustableTimer">60:00</div>

    <div class="timer-buttons">
      <button id="minus30Btn" class="minus" type="button">-30 sek</button>
      <button id="plus30Btn" type="button">+30 sek</button>
    </div>
  </div>

  <div class="timer-box" id="fixedTimerBox">
    <div class="timer-label">Fast tid</div>
    <div class="timer-time" id="fixedTimer">60:00</div>
  </div>
</div>

<script>
  "use strict";

  const MAP_ID = "map_7b78e732d0bc3efcd9d57fcf33eec995";

  const POSTS = [
    {"code": "1234", "name": "Post 1", "lat": 55.715006, "lon": 9.989017, "popup": "Post 1: Atletikbanen<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "2345", "name": "Post 2", "lat": 55.714184, "lon": 9.987867, "popup": "Post 2: Bålpladsen<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "3456", "name": "Post 3", "lat": 55.714649, "lon": 9.992448, "popup": "Post 3: Søen<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "4567", "name": "Post 4", "lat": 55.713184, "lon": 9.989702, "popup": "Post 4: Rododendron<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "5678", "name": "Post 5", "lat": 55.713582, "lon": 9.99129, "popup": "Post 5: Beachvolleybanerne<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "6789", "name": "Post 6", "lat": 55.7137, "lon": 9.989384, "popup": "Post 6: Støvlevasken<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "7891", "name": "Post 7", "lat": 55.713724, "lon": 9.987689, "popup": "Post 7: Crossfit<br><i>Indtast næste kode for at fortsætte…</i>"},
    {"code": "8912", "name": "Post 8", "lat": 55.712535, "lon": 9.987702, "popup": "Post 8: Hellebjerg skiltet<br><i>Indtast næste kode for at fortsætte…</i>"}
  ];

  const START_CODE = "Start";

  const SHOW_HALO = false;
  const USE_MAX_BOUNDS = false;
  const MAX_BOUNDS = [[55.7115, 9.9855], [55.7165, 9.9945]];

  // TIMER CONFIGURATION
  const START_DURATION_MS = 60 * 60 * 1000;
  const ADJUSTMENT_MS = 30 * 1000;

  let adjustableEndAt = null;
  let fixedEndAt = null;
  let timerTick = null;

  let nextIndex = 0;
  let gameLayer;

  function leafletMap(){
    return window[MAP_ID];
  }

  function mmss(ms){
    const totalSeconds = Math.ceil(ms / 1000);
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;

    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function renderTimers(){
    if (!adjustableEndAt || !fixedEndAt) return;

    const adjustableLeft = Math.max(0, adjustableEndAt - Date.now());
    const fixedLeft = Math.max(0, fixedEndAt - Date.now());

    const adjustableEl = document.getElementById("adjustableTimer");
    const fixedEl = document.getElementById("fixedTimer");

    if (adjustableEl){
      adjustableEl.textContent = mmss(adjustableLeft);
      adjustableEl.style.color = adjustableLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }

    if (fixedEl){
      fixedEl.textContent = mmss(fixedLeft);
      fixedEl.style.color = fixedLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }

    if (adjustableLeft === 0){
      timeUp();
    }

    if (adjustableLeft === 0 && fixedLeft === 0){
      clearInterval(timerTick);
      timerTick = null;
    }
  }

  function startTimers(){
    const wrapper = document.getElementById("timer-wrapper");

    adjustableEndAt = Date.now() + START_DURATION_MS;
    fixedEndAt = Date.now() + START_DURATION_MS;

    if (wrapper){
      wrapper.style.display = "flex";
    }

    if (timerTick){
      clearInterval(timerTick);
    }

    renderTimers();
    timerTick = setInterval(renderTimers, 250);
  }

  function adjustAdjustableTimer(deltaMs){
    if (!adjustableEndAt) return;

    adjustableEndAt = Math.max(Date.now(), adjustableEndAt + deltaMs);

    renderTimers();

    const box = document.getElementById("adjustableTimerBox");

    if (box){
      box.classList.add("flash");
      setTimeout(() => box.classList.remove("flash"), 350);
    }
  }

  function timeUp(){
    setFeedback("Tiden er udløbet ⏳", false);

    const f = document.getElementById("kode");
    const b = document.getElementById("checkBtn");

    if (f) f.disabled = true;
    if (b) b.disabled = true;
  }

  function makeDivIcon(){
    return L.divIcon({
      className: "pulse-marker",
      html: "<div class='pin'></div><div class='pulse'></div>",
      iconSize: [24,24],
      iconAnchor: [12,12]
    });
  }

  function updateProgress(){
    const pct = Math.min(100, Math.round((nextIndex / POSTS.length) * 100));
    const bar = document.getElementById("progressBar");

    if (bar){
      bar.style.width = pct + "%";
    }
  }

  function showPost(p){
    L.marker([p.lat, p.lon], { icon: makeDivIcon() })
      .addTo(gameLayer)
      .bindPopup(p.popup)
      .openPopup();

    if (SHOW_HALO){
      L.circle([p.lat, p.lon], {
        radius: 35,
        color: "#1f7ae0",
        weight: 2,
        fillOpacity: 0.08
      }).addTo(gameLayer);
    }

    leafletMap().setView([p.lat, p.lon], 18, { animate:true });
  }

  function setFeedback(msg, ok=false){
    const el = document.getElementById("feedback");

    if (!el) return;

    el.innerHTML = `<span style="color:${ok ? "var(--ok)" : "var(--err)"}">${msg}</span>`;

    if (navigator.vibrate){
      navigator.vibrate(ok ? [60,40,60] : 120);
    }
  }

  function autoFocusMobile(el){
    if (!el) return;

    const tryFocus = () => {
      el.focus({ preventScroll: true });

      if (el.setSelectionRange){
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    };

    requestAnimationFrame(tryFocus);
    setTimeout(tryFocus, 180);
    setTimeout(tryFocus, 400);
  }

  let lastCheck = 0;

  async function checkKode(){
    const now = Date.now();

    if (now - lastCheck < 250) return;

    lastCheck = now;

    const field = document.getElementById("kode");
    const kode = (field.value || "").trim();

    if (!leafletMap()){
      return setFeedback("Kort ikke klar – prøv igen om et øjeblik…");
    }

    const expected = POSTS[nextIndex];

    if (!expected || kode !== expected.code){
      setFeedback("Forkert kode – prøv igen.");
      field.setAttribute("aria-invalid", "true");
      field.select();
      return;
    }

    field.removeAttribute("aria-invalid");

    showPost(expected);

    nextIndex = Math.min(nextIndex + 1, POSTS.length);

    updateProgress();

    setFeedback(`${expected.name} låst op ✅`, true);

    field.value = "";

    if (nextIndex === POSTS.length){
      setFeedback("Alle poster låst op – flot! 🎉", true);
      field.blur();
    } else {
      autoFocusMobile(field);
    }
  }

  function init(){
    const map = leafletMap();

    if (!map){
      return setTimeout(init, 200);
    }

    gameLayer = L.layerGroup().addTo(map);

    map.scrollWheelZoom.disable();

    if (USE_MAX_BOUNDS && Array.isArray(MAX_BOUNDS)){
      map.setMaxBounds(MAX_BOUNDS);
    }

    updateProgress();

    const input = document.getElementById("kode");
    const gate = document.getElementById("start-gate");

    if (gate && gate.style.display === "none"){
      autoFocusMobile(input);
    }
  }

  function initGate(){
    const btn = document.getElementById("startBtn");
    const inp = document.getElementById("startCode");
    const msg = document.getElementById("startMsg");

    autoFocusMobile(inp);

    function openIfValid(){
      if ((inp.value || "").trim() === START_CODE){
        document.getElementById("start-gate").style.display = "none";

        nextIndex = 0;

        if (gameLayer){
          gameLayer.clearLayers();
        }

        updateProgress();

        startTimers();

        autoFocusMobile(document.getElementById("kode"));
      } else {
        msg.textContent = "Forkert startkode.";
        autoFocusMobile(inp);
      }
    }

    btn.addEventListener("click", openIfValid);

    inp.addEventListener("keydown", e => {
      if (e.key === "Enter"){
        openIfValid();
      }
    });

    document.getElementById("start-gate").addEventListener("touchstart", () => autoFocusMobile(inp));
  }

  document.addEventListener("DOMContentLoaded", () => {
    const checkBtn = document.getElementById("checkBtn");
    const kode = document.getElementById("kode");

    const plus30Btn = document.getElementById("plus30Btn");
    const minus30Btn = document.getElementById("minus30Btn");

    if (checkBtn){
      checkBtn.addEventListener("click", checkKode);
    }

    if (kode){
      kode.addEventListener("keydown", e => {
        if (e.key === "Enter"){
          e.preventDefault();
          checkKode();
        }
      });
    }

    if (plus30Btn){
      plus30Btn.addEventListener("click", () => adjustAdjustableTimer(ADJUSTMENT_MS));
    }

    if (minus30Btn){
      minus30Btn.addEventListener("click", () => adjustAdjustableTimer(-ADJUSTMENT_MS));
    }

    initGate();
    init();
  });
</script>

</body>
