<style>
  :root{
    --brand:#1f7ae0;
    --ok:#14a44d;
    --err:#c62828;
    --bg:#fff;
    --ink:#222;
    --muted:#6b7280;
    --radius:14px;
    --shadow:0 6px 24px rgba(0,0,0,.12);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b0f14;
      --ink:#e5e7eb;
      --muted:#9aa4b2;
    }
  }

  #code-panel{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:560px;
    max-width:calc(100vw - 760px);
    min-width:520px;
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    z-index:9999;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  #kode{
    padding:10px 12px;
    min-width:180px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #cfd8dc;
  }

  #checkBtn{
    padding:10px 14px;
    border-radius:10px;
    border:0;
    cursor:pointer;
    font-weight:600;
    background:var(--brand);
    color:white;
  }

  #checkBtn:disabled,
  #kode:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  #feedback{
    font-weight:600;
    min-width:160px;
  }

  .progress{
    width:100%;
    height:8px;
    background:rgba(0,0,0,.06);
    border-radius:999px;
    overflow:hidden;
  }

  .progress__bar{
    height:100%;
    width:0;
    background:var(--brand);
    transition:width .35s;
  }

  .pulse-marker .pin{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--brand);
    border:3px solid #fff;
    box-shadow:0 0 0 2px var(--brand);
  }

  .pulse-marker .pulse{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:14px;
    height:14px;
    border-radius:50%;
    border:2px solid var(--brand);
    opacity:.5;
    animation:pulse 1.8s infinite ease-out;
  }

  @keyframes pulse{
    0%{
      transform:translate(-50%,-50%) scale(.6);
      opacity:.9;
    }

    100%{
      transform:translate(-50%,-50%) scale(2.2);
      opacity:0;
    }
  }

  #start-gate{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    background:rgba(0,0,0,.55);
    z-index:10000;
  }

  .gate-card{
    background:var(--bg);
    color:var(--ink);
    width:min(520px,92vw);
    padding:22px;
    border-radius:16px;
    box-shadow:var(--shadow);
  }

  .gate-card h2{
    margin:0 0 8px;
  }

  .gate-card p{
    margin:0 0 14px;
    color:var(--muted);
  }

  .gate-card input{
    width:100%;
    padding:12px 14px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #cfd8dc;
  }

  .gate-card button{
    margin-top:12px;
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:0;
    background:var(--brand);
    color:white;
    font-weight:700;
  }

  .leaflet-popup-content{
    line-height:1.35;
    max-width:240px;
  }

  #timer-wrapper{
    position:fixed;
    top:14px;
    right:12px;
    z-index:10001;
    display:none;
    gap:10px;
    align-items:stretch;
  }

  .timer-box{
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    font-variant-numeric:tabular-nums;
    min-width:150px;
    text-align:center;
  }

  .timer-label{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  .timer-time{
    font-size:26px;
    line-height:1;
    font-weight:900;
  }

  .timer-buttons{
    margin-top:10px;
    display:flex;
    gap:8px;
    justify-content:center;
  }

  .timer-buttons button{
    border:0;
    border-radius:10px;
    padding:8px 10px;
    font-weight:800;
    cursor:pointer;
    background:var(--brand);
    color:white;
  }

  .timer-buttons button.minus{
    background:var(--err);
  }

  .timer-buttons button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .timer-box.flash{
    animation:tflash .35s ease;
  }

  @keyframes tflash{
    from{
      transform:scale(1.06);
    }

    to{
      transform:scale(1);
    }
  }

  #dramatic-overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;
    background:rgba(198,40,40,0);
    transition:background .8s ease;
  }

  body.final-phase #dramatic-overlay{
    background:rgba(198,40,40,.28);
  }

  #phase-banner{
    position:fixed;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    z-index:10002;
    display:none;
    width:min(760px,92vw);
    background:rgba(10,10,10,.88);
    color:white;
    border:2px solid rgba(255,255,255,.35);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    padding:18px 22px;
    text-align:center;
  }

  #phase-banner h1{
    margin:0 0 8px;
    font-size:34px;
    font-weight:1000;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  #phase-banner p{
    margin:4px 0;
    font-size:17px;
    font-weight:700;
  }

  body.final-phase:not(.phase-banner-closed) #phase-banner{
    display:block;
    animation:bannerPulse 1.2s ease-in-out infinite alternate;
  }

  #closePhaseBannerBtn{
    position:absolute;
    top:10px;
    right:12px;
    width:34px;
    height:34px;
    border:0;
    border-radius:999px;
    background:rgba(255,255,255,.16);
    color:white;
    font-size:26px;
    line-height:1;
    font-weight:900;
    cursor:pointer;
  }

  #closePhaseBannerBtn:hover{
    background:rgba(255,255,255,.28);
  }

  @keyframes bannerPulse{
    from{
      transform:translateX(-50%) scale(1);
    }

    to{
      transform:translateX(-50%) scale(1.025);
    }
  }

  #mission-board-shell{
    position:fixed;
    left:12px;
    bottom:12px;
    z-index:10001;
    width:min(360px,92vw);
    display:none;
    flex-direction:column;
    gap:8px;
  }

  #missionToggleBtn{
    width:100%;
    border:0;
    border-radius:14px;
    padding:10px 14px;
    background:rgba(10,10,10,.92);
    color:white;
    font-weight:1000;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }

  #missionCount{
    display:inline-grid;
    place-items:center;
    min-width:28px;
    height:28px;
    border-radius:999px;
    background:var(--brand);
    color:white;
    font-weight:1000;
  }

  #mission-board{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:55vh;
    overflow:auto;
  }

  #mission-board-shell.collapsed #mission-board{
    display:none;
  }

  .mission-card{
    background:rgba(255,255,255,.92);
    color:#111;
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    border-left:10px solid #c62828;
    backdrop-filter:blur(8px);
    animation:missionPop .35s ease;
  }

  @media (prefers-color-scheme: dark){
    .mission-card{
      background:rgba(15,20,28,.92);
      color:#f5f5f5;
    }
  }

  .mission-card h3{
    margin:0 0 8px;
    font-size:18px;
    font-weight:1000;
  }

  .mission-card p{
    margin:4px 0;
    font-size:15px;
    font-weight:700;
  }

  .mission-card.red{
    border-left-color:#c62828;
  }

  .mission-card.blue{
    border-left-color:#1f7ae0;
  }

  .mission-card.green{
    border-left-color:#14a44d;
  }

  .mission-card.black{
    border-left-color:#111;
  }

  @keyframes missionPop{
    from{
      transform:translateY(12px) scale(.96);
      opacity:0;
    }

    to{
      transform:translateY(0) scale(1);
      opacity:1;
    }
  }

  #random-mission-popup{
    position:fixed;
    inset:0;
    z-index:10003;
    display:none;
    place-items:center;
    background:rgba(0,0,0,.55);
  }

  .random-mission-card{
    width:min(560px,92vw);
    background:var(--bg);
    color:var(--ink);
    border-radius:22px;
    padding:26px;
    box-shadow:0 18px 60px rgba(0,0,0,.45);
    border:3px solid #c62828;
    text-align:center;
    animation:missionPop .35s ease;
  }

  .random-mission-card h2{
    margin:0 0 12px;
    font-size:30px;
    font-weight:1000;
    color:#c62828;
    text-transform:uppercase;
  }

  .random-mission-card p{
    font-size:18px;
    font-weight:700;
    margin:8px 0;
  }

  .random-mission-card button{
    margin-top:18px;
    border:0;
    border-radius:12px;
    padding:12px 18px;
    background:var(--brand);
    color:white;
    font-weight:900;
    cursor:pointer;
  }

  @media (max-width:700px){
    #code-panel{
      top:12px;
      width:calc(100vw - 24px);
      max-width:none;
      min-width:0;
    }

    #timer-wrapper{
      top:auto;
      bottom:12px;
      right:12px;
      left:12px;
      justify-content:center;
    }

    .timer-box{
      min-width:0;
      width:50%;
      padding:10px;
    }

    .timer-time{
      font-size:22px;
    }

    #phase-banner{
      top:80px;
      padding:14px 16px;
    }

    #phase-banner h1{
      font-size:24px;
    }

    #phase-banner p{
      font-size:14px;
    }

    #mission-board-shell{
      bottom:120px;
      width:calc(100vw - 24px);
    }

    #mission-board{
      max-height:38vh;
    }
  }
</style>

  const START_CODE = "Start";

  const SHOW_HALO = false;
  const USE_MAX_BOUNDS = false;
  const MAX_BOUNDS = [[55.7115, 9.9855], [55.7165, 9.9945]];

  const START_DURATION_MS = 60 * 60 * 1000;
  const FINAL_PHASE_MS = 10 * 60 * 1000;

  const ADJUSTMENT_MS = 30 * 1000;
  const WRONG_ANSWER_PENALTY_MS = 30 * 1000;

  let adjustableEndAt = null;
  let fixedEndAt = null;
  let timerTick = null;
  let randomMissionTimeout = null;

  let gameIsFinished = false;
  let finalPhaseActive = false;
  let randomMissionHasAppeared = false;

  let nextIndex = 0;
  let gameLayer;

  function leafletMap(){
    return window[MAP_ID];
  }

  function mmss(ms){
    const totalSeconds = Math.ceil(ms / 1000);
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;

    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function getClockTimeFromNow(minutesFromNow){
    const d = new Date(Date.now() + minutesFromNow * 60 * 1000);

    return d.toLocaleTimeString("da-DK", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function currentAdjustmentMs(){
    return finalPhaseActive ? ADJUSTMENT_MS * 2 : ADJUSTMENT_MS;
  }

  function currentWrongPenaltyMs(){
    return finalPhaseActive ? WRONG_ANSWER_PENALTY_MS * 2 : WRONG_ANSWER_PENALTY_MS;
  }

  function formatReward(rewardMin){
    return finalPhaseActive ? rewardMin * 2 : rewardMin;
  }

  function renderTimers(){
    if (!adjustableEndAt || !fixedEndAt || gameIsFinished) return;

    const now = Date.now();

    const adjustableLeft = Math.max(0, adjustableEndAt - now);
    const fixedLeft = Math.max(0, fixedEndAt - now);

    const adjustableEl = document.getElementById("adjustableTimer");
    const fixedEl = document.getElementById("fixedTimer");

    if (!finalPhaseActive && fixedLeft <= FINAL_PHASE_MS && fixedLeft > 0){
      activateFinalPhase();
    }

    if (fixedLeft === 0){
      finishGameByFixedTimer(adjustableLeft);
      return;
    }

    if (adjustableEl){
      adjustableEl.textContent = mmss(adjustableLeft);
      adjustableEl.style.color = adjustableLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }

    if (fixedEl){
      fixedEl.textContent = mmss(fixedLeft);
      fixedEl.style.color = fixedLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }
  }

  function startTimers(){
    const wrapper = document.getElementById("timer-wrapper");

    gameIsFinished = false;
    finalPhaseActive = false;
    randomMissionHasAppeared = false;

    document.body.classList.remove("final-phase");
    document.body.classList.remove("phase-banner-closed");

    adjustableEndAt = Date.now() + START_DURATION_MS;
    fixedEndAt = Date.now() + START_DURATION_MS;

    if (wrapper){
      wrapper.style.display = "flex";
    }

    if (timerTick){
      clearInterval(timerTick);
    }

    if (randomMissionTimeout){
      clearTimeout(randomMissionTimeout);
    }

    scheduleRandomMissionAroundMiddle();

    updateTimerButtonLabels();
    renderTimers();

    timerTick = setInterval(renderTimers, 250);
  }

  function scheduleRandomMissionAroundMiddle(){
    const minDelay = 25 * 60 * 1000;
    const maxDelay = 35 * 60 * 1000;
    const randomDelay = Math.floor(minDelay + Math.random() * (maxDelay - minDelay));

    randomMissionTimeout = setTimeout(() => {
      if (!gameIsFinished && !randomMissionHasAppeared){
        showRandomMission();
      }
    }, randomDelay);
  }

  function showRandomMission(){
    randomMissionHasAppeared = true;

    const popup = document.getElementById("random-mission-popup");

    const mission = {
      color: "red",
      title: "Rød mission låst op",
      people: 4,
      startOffsetMin: 3,
      rewardMin: 7
    };

    const title = document.getElementById("randomMissionTitle");
    const people = document.getElementById("randomMissionPeople");
    const start = document.getElementById("randomMissionStart");
    const reward = document.getElementById("randomMissionReward");

    if (title) title.textContent = mission.title;
    if (people) people.textContent = `Kræver ${mission.people} personer.`;
    if (start) start.textContent = `Start kl. ${getClockTimeFromNow(mission.startOffsetMin)}.`;
    if (reward) reward.textContent = `Belønning: +${formatReward(mission.rewardMin)} minutter.`;

    if (popup){
      popup.style.display = "grid";
    }

    addMissionCard(mission);
    setFeedback("Akut mission låst op! Kig på missionstavlen.", true);
  }

  function closeRandomMissionPopup(){
    const popup = document.getElementById("random-mission-popup");

    if (popup){
      popup.style.display = "none";
    }
  }

  function activateFinalPhase(){
    finalPhaseActive = true;

    document.body.classList.add("final-phase");
    document.body.classList.remove("phase-banner-closed");

    updateTimerButtonLabels();

    const finalMission = {
      color: "black",
      title: "Sidste mission er låst op",
      people: 6,
      startOffsetMin: 2,
      rewardMin: 12
    };

    addMissionCard(finalMission);

    setFeedback("SLUTFASE AKTIVERET! Bonusser tæller dobbelt. Forkerte svar giver dobbelt straf.", true);
  }

  function closePhaseBanner(){
    document.body.classList.add("phase-banner-closed");
  }

  function updateTimerButtonLabels(){
    const plus = document.getElementById("plus30Btn");
    const minus = document.getElementById("minus30Btn");

    if (plus){
      plus.textContent = finalPhaseActive ? "+60 sek" : "+30 sek";
    }

    if (minus){
      minus.textContent = finalPhaseActive ? "-60 sek" : "-30 sek";
    }
  }

  function addMissionCard(mission){
    const shell = document.getElementById("mission-board-shell");
    const board = document.getElementById("mission-board");

    if (!shell || !board) return;

    shell.style.display = "flex";

    const card = document.createElement("div");
    card.className = `mission-card ${mission.color || "red"}`;

    const reward = formatReward(mission.rewardMin);
    const startTime = getClockTimeFromNow(mission.startOffsetMin);

    card.innerHTML = `
      <h3>${mission.title}</h3>
      <p>Kræver ${mission.people} personer.</p>
      <p>Start kl. ${startTime}.</p>
      <p>Belønning: +${reward} minutter${finalPhaseActive ? " — slutfase x2" : ""}.</p>
    `;

    board.prepend(card);

    updateMissionCount();
  }

  function updateMissionCount(){
    const board = document.getElementById("mission-board");
    const count = document.getElementById("missionCount");

    if (!board || !count) return;

    count.textContent = board.children.length;
  }

  function toggleMissionBoard(){
    const shell = document.getElementById("mission-board-shell");
    const text = document.getElementById("missionToggleText");

    if (!shell || !text) return;

    shell.classList.toggle("collapsed");

    if (shell.classList.contains("collapsed")){
      text.textContent = "Vis missioner";
    } else {
      text.textContent = "Skjul missioner";
    }
  }

  function adjustAdjustableTimer(deltaMs){
    if (!adjustableEndAt || gameIsFinished) return;

    adjustableEndAt = Math.max(Date.now(), adjustableEndAt + deltaMs);

    renderTimers();

    const box = document.getElementById("adjustableTimerBox");

    if (box){
      box.classList.add("flash");
      setTimeout(() => box.classList.remove("flash"), 350);
    }
  }

  function applyWrongAnswerPenalty(){
    const penalty = currentWrongPenaltyMs();

    adjustAdjustableTimer(-penalty);

    if (finalPhaseActive){
      setFeedback("Forkert kode – dobbelt straf i slutfasen: -60 sek.", false);
    } else {
      setFeedback("Forkert kode – prøv igen. Straf: -30 sek.", false);
    }
  }

  function finishGameByFixedTimer(scoreMs){
    gameIsFinished = true;

    if (timerTick){
      clearInterval(timerTick);
      timerTick = null;
    }

    if (randomMissionTimeout){
      clearTimeout(randomMissionTimeout);
      randomMissionTimeout = null;
    }

    const scoreText = mmss(scoreMs);

    const adjustableEl = document.getElementById("adjustableTimer");
    const fixedEl = document.getElementById("fixedTimer");

    if (adjustableEl){
      adjustableEl.textContent = scoreText;
      adjustableEl.style.color = "var(--ok)";
    }

    if (fixedEl){
      fixedEl.textContent = "00:00";
      fixedEl.style.color = "var(--err)";
    }

    document.body.classList.remove("final-phase");

    setFeedback(`Tiden er slut. Jeres score er ${scoreText} ⏱️`, true);

    const f = document.getElementById("kode");
    const b = document.getElementById("checkBtn");
    const plus = document.getElementById("plus30Btn");
    const minus = document.getElementById("minus30Btn");

    if (f) f.disabled = true;
    if (b) b.disabled = true;
    if (plus) plus.disabled = true;
    if (minus) minus.disabled = true;
  }

  function makeDivIcon(){
    return L.divIcon({
      className: "pulse-marker",
      html: "<div class='pin'></div><div class='pulse'></div>",
      iconSize: [24,24],
      iconAnchor: [12,12]
    });
  }

  function updateProgress(){
    const pct = Math.min(100, Math.round((nextIndex / POSTS.length) * 100));
    const bar = document.getElementById("progressBar");

    if (bar){
      bar.style.width = pct + "%";
    }
  }

  function showPost(p){
    L.marker([p.lat, p.lon], { icon: makeDivIcon() })
      .addTo(gameLayer)
      .bindPopup(p.popup)
      .openPopup();

    if (SHOW_HALO){
      L.circle([p.lat, p.lon], {
        radius: 35,
        color: "#1f7ae0",
        weight: 2,
        fillOpacity: 0.08
      }).addTo(gameLayer);
    }

    leafletMap().setView([p.lat, p.lon], 18, { animate:true });
  }

  function setFeedback(msg, ok=false){
    const el = document.getElementById("feedback");

    if (!el) return;

    el.innerHTML = `<span style="color:${ok ? "var(--ok)" : "var(--err)"}">${msg}</span>`;

    if (navigator.vibrate){
      navigator.vibrate(ok ? [60,40,60] : 120);
    }
  }

  function autoFocusMobile(el){
    if (!el) return;

    const tryFocus = () => {
      el.focus({ preventScroll: true });

      if (el.setSelectionRange){
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    };

    requestAnimationFrame(tryFocus);
    setTimeout(tryFocus, 180);
    setTimeout(tryFocus, 400);
  }

  let lastCheck = 0;

  async function checkKode(){
    if (gameIsFinished) return;

    const now = Date.now();

    if (now - lastCheck < 250) return;

    lastCheck = now;

    const field = document.getElementById("kode");
    const kode = (field.value || "").trim();

    if (!leafletMap()){
      return setFeedback("Kort ikke klar – prøv igen om et øjeblik…");
    }

    const expected = POSTS[nextIndex];

    if (!expected || kode !== expected.code){
      field.setAttribute("aria-invalid", "true");
      field.select();

      applyWrongAnswerPenalty();

      return;
    }

    field.removeAttribute("aria-invalid");

    showPost(expected);

    if (expected.mission){
      addMissionCard(expected.mission);
    }

    nextIndex = Math.min(nextIndex + 1, POSTS.length);

    updateProgress();

    setFeedback(`${expected.name} låst op ✅`, true);

    field.value = "";

    if (nextIndex === POSTS.length){
      setFeedback("Alle poster låst op – flot! 🎉", true);
      field.blur();
    } else {
      autoFocusMobile(field);
    }
  }

  function init(){
    const map = leafletMap();

    if (!map){
      return setTimeout(init, 200);
    }

    gameLayer = L.layerGroup().addTo(map);

    map.scrollWheelZoom.disable();

    if (USE_MAX_BOUNDS && Array.isArray(MAX_BOUNDS)){
      map.setMaxBounds(MAX_BOUNDS);
    }

    updateProgress();

    const input = document.getElementById("kode");
    const gate = document.getElementById("start-gate");

    if (gate && gate.style.display === "none"){
      autoFocusMobile(input);
    }
  }

  function initGate(){
    const btn = document.getElementById("startBtn");
    const inp = document.getElementById("startCode");
    const msg = document.getElementById("startMsg");

    autoFocusMobile(inp);

    function openIfValid(){
      if ((inp.value || "").trim() === START_CODE){
        document.getElementById("start-gate").style.display = "none";

        nextIndex = 0;
        gameIsFinished = false;
        finalPhaseActive = false;
        randomMissionHasAppeared = false;

        document.body.classList.remove("final-phase");
        document.body.classList.remove("phase-banner-closed");

        const missionShell = document.getElementById("mission-board-shell");
        const missionBoard = document.getElementById("mission-board");
        const missionToggleText = document.getElementById("missionToggleText");

        if (missionBoard){
          missionBoard.innerHTML = "";
        }

        if (missionShell){
          missionShell.style.display = "none";
          missionShell.classList.remove("collapsed");
        }

        if (missionToggleText){
          missionToggleText.textContent = "Skjul missioner";
        }

        updateMissionCount();

        const kodeInput = document.getElementById("kode");
        const checkButton = document.getElementById("checkBtn");
        const plus = document.getElementById("plus30Btn");
        const minus = document.getElementById("minus30Btn");

        if (kodeInput) kodeInput.disabled = false;
        if (checkButton) checkButton.disabled = false;
        if (plus) plus.disabled = false;
        if (minus) minus.disabled = false;

        if (gameLayer){
          gameLayer.clearLayers();
        }

        updateProgress();

        startTimers();

        autoFocusMobile(document.getElementById("kode"));
      } else {
        msg.textContent = "Forkert startkode.";
        autoFocusMobile(inp);
      }
    }

    btn.addEventListener("click", openIfValid);

    inp.addEventListener("keydown", e => {
      if (e.key === "Enter"){
        openIfValid();
      }
    });

    document.getElementById("start-gate").addEventListener("touchstart", () => autoFocusMobile(inp));
  }

  document.addEventListener("DOMContentLoaded", () => {
    const checkBtn = document.getElementById("checkBtn");
    const kode = document.getElementById("kode");

    const plus30Btn = document.getElementById("plus30Btn");
    const minus30Btn = document.getElementById("minus30Btn");
    const closeRandomMissionBtn = document.getElementById("closeRandomMissionBtn");
    const closePhaseBannerBtn = document.getElementById("closePhaseBannerBtn");
    const missionToggleBtn = document.getElementById("missionToggleBtn");

    if (checkBtn){
      checkBtn.addEventListener("click", checkKode);
    }

    if (kode){
      kode.addEventListener("keydown", e => {
        if (e.key === "Enter"){
          e.preventDefault();
          checkKode();
        }
      });
    }

    if (plus30Btn){
      plus30Btn.addEventListener("click", () => adjustAdjustableTimer(currentAdjustmentMs()));
    }

    if (minus30Btn){
      minus30Btn.addEventListener("click", () => adjustAdjustableTimer(-currentAdjustmentMs()));
    }

    if (closeRandomMissionBtn){
      closeRandomMissionBtn.addEventListener("click", closeRandomMissionPopup);
    }

    if (closePhaseBannerBtn){
      closePhaseBannerBtn.addEventListener("click", closePhaseBanner);
    }

    if (missionToggleBtn){
      missionToggleBtn.addEventListener("click", toggleMissionBoard);
    }

    initGate();
    init();
  });
</script>
