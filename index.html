<style>
  :root{
    --brand:#1f7ae0;
    --ok:#14a44d;
    --err:#c62828;
    --bg:#fff;
    --ink:#222;
    --muted:#6b7280;
    --radius:14px;
    --shadow:0 6px 24px rgba(0,0,0,.12);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b0f14;
      --ink:#e5e7eb;
      --muted:#9aa4b2;
    }
  }

  #code-panel{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:560px;
    max-width:calc(100vw - 760px);
    min-width:520px;
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    z-index:9999;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  #kode{
    padding:10px 12px;
    min-width:180px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #cfd8dc;
  }

  #checkBtn{
    padding:10px 14px;
    border-radius:10px;
    border:0;
    cursor:pointer;
    font-weight:600;
    background:var(--brand);
    color:white;
  }

  #checkBtn:disabled,
  #kode:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  #feedback{
    font-weight:600;
    min-width:160px;
  }

  .progress{
    width:100%;
    height:8px;
    background:rgba(0,0,0,.06);
    border-radius:999px;
    overflow:hidden;
  }

  .progress__bar{
    height:100%;
    width:0;
    background:var(--brand);
    transition:width .35s;
  }

  .pulse-marker .pin{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--brand);
    border:3px solid #fff;
    box-shadow:0 0 0 2px var(--brand);
  }

  .pulse-marker .pulse{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:14px;
    height:14px;
    border-radius:50%;
    border:2px solid var(--brand);
    opacity:.5;
    animation:pulse 1.8s infinite ease-out;
  }

  @keyframes pulse{
    0%{
      transform:translate(-50%,-50%) scale(.6);
      opacity:.9;
    }

    100%{
      transform:translate(-50%,-50%) scale(2.2);
      opacity:0;
    }
  }

  #start-gate{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    background:rgba(0,0,0,.55);
    z-index:10000;
  }

  .gate-card{
    background:var(--bg);
    color:var(--ink);
    width:min(520px,92vw);
    padding:22px;
    border-radius:16px;
    box-shadow:var(--shadow);
  }

  .gate-card h2{
    margin:0 0 8px;
  }

  .gate-card p{
    margin:0 0 14px;
    color:var(--muted);
  }

  .gate-card input{
    width:100%;
    padding:12px 14px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #cfd8dc;
  }

  .gate-card button{
    margin-top:12px;
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:0;
    background:var(--brand);
    color:white;
    font-weight:700;
  }

  .leaflet-popup-content{
    line-height:1.35;
    max-width:240px;
  }

  #timer-wrapper{
    position:fixed;
    top:14px;
    right:12px;
    z-index:10001;
    display:none;
    gap:10px;
    align-items:stretch;
  }

  .timer-box{
    background:var(--bg);
    color:var(--ink);
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid rgba(0,0,0,.08);
    box-shadow:var(--shadow);
    font-variant-numeric:tabular-nums;
    min-width:150px;
    text-align:center;
  }

  .timer-label{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  .timer-time{
    font-size:26px;
    line-height:1;
    font-weight:900;
  }

  .timer-buttons{
    margin-top:10px;
    display:flex;
    gap:8px;
    justify-content:center;
  }

  .timer-buttons button{
    border:0;
    border-radius:10px;
    padding:8px 10px;
    font-weight:800;
    cursor:pointer;
    background:var(--brand);
    color:white;
  }

  .timer-buttons button.minus{
    background:var(--err);
  }

  .timer-buttons button:disabled{
    opacity:.45;
    cursor:not-allowed;
  }

  .timer-box.flash{
    animation:tflash .35s ease;
  }

  @keyframes tflash{
    from{
      transform:scale(1.06);
    }

    to{
      transform:scale(1);
    }
  }

  #dramatic-overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9997;
    background:rgba(198,40,40,0);
    transition:background .8s ease;
  }

  body.final-phase #dramatic-overlay{
    background:rgba(198,40,40,.28);
  }

  #phase-banner{
    position:fixed;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    z-index:10002;
    display:none;
    width:min(760px,92vw);
    background:rgba(10,10,10,.88);
    color:white;
    border:2px solid rgba(255,255,255,.35);
    border-radius:18px;
    box-shadow:0 12px 40px rgba(0,0,0,.35);
    padding:18px 22px;
    text-align:center;
  }

  #phase-banner h1{
    margin:0 0 8px;
    font-size:34px;
    font-weight:1000;
    letter-spacing:.04em;
    text-transform:uppercase;
  }

  #phase-banner p{
    margin:4px 0;
    font-size:17px;
    font-weight:700;
  }

  body.final-phase:not(.phase-banner-closed) #phase-banner{
    display:block;
    animation:bannerPulse 1.2s ease-in-out infinite alternate;
  }

  #closePhaseBannerBtn{
    position:absolute;
    top:10px;
    right:12px;
    width:34px;
    height:34px;
    border:0;
    border-radius:999px;
    background:rgba(255,255,255,.16);
    color:white;
    font-size:26px;
    line-height:1;
    font-weight:900;
    cursor:pointer;
  }

  #closePhaseBannerBtn:hover{
    background:rgba(255,255,255,.28);
  }

  @keyframes bannerPulse{
    from{
      transform:translateX(-50%) scale(1);
    }

    to{
      transform:translateX(-50%) scale(1.025);
    }
  }

  #mission-board-shell{
    position:fixed;
    left:12px;
    bottom:12px;
    z-index:10001;
    width:min(360px,92vw);
    display:none;
    flex-direction:column;
    gap:8px;
  }

  #missionToggleBtn{
    width:100%;
    border:0;
    border-radius:14px;
    padding:10px 14px;
    background:rgba(10,10,10,.92);
    color:white;
    font-weight:1000;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }

  #missionCount{
    display:inline-grid;
    place-items:center;
    min-width:28px;
    height:28px;
    border-radius:999px;
    background:var(--brand);
    color:white;
    font-weight:1000;
  }

  #mission-board{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height:55vh;
    overflow:auto;
  }

  #mission-board-shell.collapsed #mission-board{
    display:none;
  }

  .mission-card{
    background:rgba(255,255,255,.92);
    color:#111;
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    border-left:10px solid #c62828;
    backdrop-filter:blur(8px);
    animation:missionPop .35s ease;
  }

  @media (prefers-color-scheme: dark){
    .mission-card{
      background:rgba(15,20,28,.92);
      color:#f5f5f5;
    }
  }

  .mission-card h3{
    margin:0 0 8px;
    font-size:18px;
    font-weight:1000;
  }

  .mission-card p{
    margin:4px 0;
    font-size:15px;
    font-weight:700;
  }

  .mission-card.red{
    border-left-color:#c62828;
  }

  .mission-card.blue{
    border-left-color:#1f7ae0;
  }

  .mission-card.green{
    border-left-color:#14a44d;
  }

  .mission-card.black{
    border-left-color:#111;
  }

  @keyframes missionPop{
    from{
      transform:translateY(12px) scale(.96);
      opacity:0;
    }

    to{
      transform:translateY(0) scale(1);
      opacity:1;
    }
  }



  #activity-status-shell{
    position:fixed;
    right:12px;
    top:130px;
    z-index:10001;
    width:min(300px,92vw);
    display:none;
    flex-direction:column;
    gap:8px;
  }

  #activityStatusToggleBtn{
    width:100%;
    border:0;
    border-radius:14px;
    padding:10px 14px;
    background:rgba(10,10,10,.92);
    color:white;
    font-weight:1000;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }

  #activityStatusBadge{
    display:inline-grid;
    place-items:center;
    min-width:28px;
    height:28px;
    border-radius:999px;
    background:var(--brand);
    color:white;
    font-weight:1000;
  }

  #activity-status-card{
    background:var(--bg);
    color:var(--ink);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    border-left:10px solid var(--brand);
    backdrop-filter:blur(8px);
    animation:missionPop .35s ease;
  }

  #activity-status-card.status-flash{
    animation:statusFlash .7s ease;
  }

  #activity-status-card h3{
    margin:0 0 8px;
    font-size:18px;
    font-weight:1000;
  }

  #activity-status-card p{
    margin:6px 0;
    font-size:16px;
    font-weight:900;
  }

  #activity-status-card .open{
    color:var(--ok);
  }

  #activity-status-card .closed{
    color:var(--err);
  }

  #activity-status-shell.collapsed #activity-status-card{
    display:none;
  }

  @keyframes statusFlash{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.06); }
    100%{ transform:scale(1); }
  }

  @media (max-width:700px){
    #code-panel{
      top:12px;
      width:calc(100vw - 24px);
      max-width:none;
      min-width:0;
    }

    #timer-wrapper{
      top:auto;
      bottom:12px;
      right:12px;
      left:12px;
      justify-content:center;
    }

    .timer-box{
      min-width:0;
      width:50%;
      padding:10px;
    }

    .timer-time{
      font-size:22px;
    }

    #phase-banner{
      top:80px;
      padding:14px 16px;
    }

    #phase-banner h1{
      font-size:24px;
    }

    #phase-banner p{
      font-size:14px;
    }

    #mission-board-shell{
      bottom:120px;
      width:calc(100vw - 24px);
    }

    #mission-board{
      max-height:38vh;
    }

    #activity-status-shell{
      top:auto;
      right:12px;
      left:12px;
      bottom:86px;
      width:calc(100vw - 24px);
    }

  }
</style>

<script>
  "use strict";

  const MAP_ID = "map_7b78e732d0bc3efcd9d57fcf33eec995";

  // HER RETTER DU MISSIONER/POSTER
  // code = koden der låser missionen op
  // name = navnet på missionen/posten; vises både på kortet og i missionsarket
  // lat/lon = koordinaterne for markøren på kortet
  // people = antal personer der skal bruges
  // solveAt = fast tid på den faste timer, hvor missionen skal løses. Første mission er 56:00 = 4 min inde i løbet.

  // Beholder navnet POSTS i resten af koden, så den gamle logik stadig virker.

  const START_CODE = "Start";

  // Automatisk fælles starttid.
  // Skriv tidspunktet som tekst, fx "19:15" eller "01:05".
  // Vigtigt: Brug anførselstegn. Skriv ikke 01 eller 05 som tal i JavaScript.
  const AUTO_START_TIME = "12:45";

  const SHOW_HALO = false;
  const USE_MAX_BOUNDS = false;
  const MAX_BOUNDS = [[55.7115, 9.9855], [55.7165, 9.9945]];

  const START_DURATION_MS = 60 * 60 * 1000;
  const FINAL_PHASE_MS = 10 * 60 * 1000;

  const ADJUSTMENT_MS = 30 * 1000;
  const WRONG_ANSWER_PENALTY_MS = 30 * 1000;


  // HER RETTER DU STATUSVINDUET
  // fromMin/toMin = minutter inde i løbet, regnet fra start ved 60:00 på den faste timer.
  const ACTIVITY_STATUS_PLAN = [
    { fromMin: 0,  toMin: 10, tidsbodOpen: true,  duelsOpen: false },
    { fromMin: 10, toMin: 25, tidsbodOpen: false, duelsOpen: true  },
    { fromMin: 25, toMin: 35, tidsbodOpen: false, duelsOpen: false },
    { fromMin: 35, toMin: 45, tidsbodOpen: true,  duelsOpen: false },
    { fromMin: 45, toMin: 60, tidsbodOpen: false, duelsOpen: true  }
  ];

  let adjustableEndAt = null;
  let fixedEndAt = null;
  let timerTick = null;
  let gameIsFinished = false;
  let finalPhaseActive = false;
  let currentActivityStatusIndex = null;
  let nextIndex = 0;
  let gameLayer;

  function leafletMap(){
    return window[MAP_ID];
  }

  function mmss(ms){
    const totalSeconds = Math.ceil(ms / 1000);
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;

    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function getAutoStartParts(){
    const value = String(AUTO_START_TIME).trim();
    const match = /^(\d{1,2}):(\d{2})$/.exec(value);

    if (!match){
      throw new Error('AUTO_START_TIME skal skrives som fx "19:15" eller "01:05".');
    }

    const hour = Number(match[1]);
    const minute = Number(match[2]);

    if (hour < 0 || hour > 23 || minute < 0 || minute > 59){
      throw new Error('AUTO_START_TIME er ugyldigt. Brug et tidspunkt mellem "00:00" og "23:59".');
    }

    return { hour, minute };
  }

  function getScheduledStartAt(){
    const { hour, minute } = getAutoStartParts();
    const start = new Date();
    start.setHours(hour, minute, 0, 0);
    return start.getTime();
  }

  function formatStartClock(){
    const { hour, minute } = getAutoStartParts();
    return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
  }

  function formatCountdown(ms){
    const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    if (h > 0){
      return String(h).padStart(2, "0") + ":" +
        String(m).padStart(2, "0") + ":" +
        String(s).padStart(2, "0");
    }

    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function getClockTimeFromNow(minutesFromNow){
    const d = new Date(Date.now() + minutesFromNow * 60 * 1000);

    return d.toLocaleTimeString("da-DK", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function currentAdjustmentMs(){
    return ADJUSTMENT_MS;
  }

  function currentWrongPenaltyMs(){
    return WRONG_ANSWER_PENALTY_MS;
  }

  function formatReward(rewardMin){
    return rewardMin;
  }

  function formatSolveAt(mission){
    return mission.solveAt || "--:--";
  }


  function statusText(isOpen){
    return isOpen ? "Åben" : "Lukket";
  }

  function statusClass(isOpen){
    return isOpen ? "open" : "closed";
  }

  function getActivityStatusIndex(fixedLeft){
    const elapsedMin = Math.floor((START_DURATION_MS - fixedLeft) / 60000);

    for (let i = 0; i < ACTIVITY_STATUS_PLAN.length; i++){
      const phase = ACTIVITY_STATUS_PLAN[i];

      if (elapsedMin >= phase.fromMin && elapsedMin < phase.toMin){
        return i;
      }
    }

    return ACTIVITY_STATUS_PLAN.length - 1;
  }

  function openActivityStatus(){
    const shell = document.getElementById("activity-status-shell");
    const text = document.getElementById("activityStatusToggleText");

    if (!shell || !text) return;

    shell.style.display = "flex";
    shell.classList.remove("collapsed");
    text.textContent = "Skjul status";
  }

  function toggleActivityStatus(){
    const shell = document.getElementById("activity-status-shell");
    const text = document.getElementById("activityStatusToggleText");

    if (!shell || !text) return;

    shell.classList.toggle("collapsed");
    shell.style.display = "flex";

    if (shell.classList.contains("collapsed")){
      text.textContent = "Vis status";
    } else {
      text.textContent = "Skjul status";
    }
  }

  function updateActivityStatus(fixedLeft){
    const idx = getActivityStatusIndex(fixedLeft);
    const phase = ACTIVITY_STATUS_PLAN[idx];

    const tidsbodEl = document.getElementById("tidsbodStatus");
    const duelEl = document.getElementById("duelStatus");
    const card = document.getElementById("activity-status-card");

    if (!phase || !tidsbodEl || !duelEl) return;

    tidsbodEl.innerHTML = `Tidsbod (Foredragssal): <span class="${statusClass(phase.tidsbodOpen)}">${statusText(phase.tidsbodOpen)}</span>`;
    duelEl.innerHTML = `Dueller (Hallen): <span class="${statusClass(phase.duelsOpen)}">${statusText(phase.duelsOpen)}</span>`;

    if (currentActivityStatusIndex !== idx){
      currentActivityStatusIndex = idx;
      openActivityStatus();

      if (card){
        card.classList.remove("status-flash");
        void card.offsetWidth;
        card.classList.add("status-flash");
      }
    }
  }

  function renderTimers(){
    if (!adjustableEndAt || !fixedEndAt || gameIsFinished) return;

    const now = Date.now();

    const adjustableLeft = Math.max(0, adjustableEndAt - now);
    const fixedLeft = Math.max(0, fixedEndAt - now);

    const adjustableEl = document.getElementById("adjustableTimer");
    const fixedEl = document.getElementById("fixedTimer");

    updateActivityStatus(fixedLeft);

    if (!finalPhaseActive && fixedLeft <= FINAL_PHASE_MS && fixedLeft > 0){
      activateFinalPhase();
    }

    if (fixedLeft === 0){
      finishGameByFixedTimer(adjustableLeft);
      return;
    }

    if (adjustableEl){
      adjustableEl.textContent = mmss(adjustableLeft);
      adjustableEl.style.color = adjustableLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }

    if (fixedEl){
      fixedEl.textContent = mmss(fixedLeft);
      fixedEl.style.color = fixedLeft <= 60000 ? "var(--err)" : "var(--ink)";
    }
  }

  function startTimers(forceStartNow=false){
    const wrapper = document.getElementById("timer-wrapper");

    gameIsFinished = false;
    finalPhaseActive = false;
    currentActivityStatusIndex = null;
    document.body.classList.remove("final-phase");
    document.body.classList.remove("phase-banner-closed");

    // Normal start: Timerne tager udgangspunkt i den fælles starttid, fx 19:15.
    // Overrule/teststart: Hvis forceStartNow=true, starter timerne fra nu.
    const startAt = forceStartNow ? Date.now() : getScheduledStartAt();
    const endAt = startAt + START_DURATION_MS;

    adjustableEndAt = endAt;
    fixedEndAt = endAt;

    if (wrapper){
      wrapper.style.display = "flex";
    }

    if (timerTick){
      clearInterval(timerTick);
    }

    updateTimerButtonLabels();
    renderTimers();

    timerTick = setInterval(renderTimers, 250);
  }

  function activateFinalPhase(){
    finalPhaseActive = true;

    document.body.classList.add("final-phase");
    document.body.classList.remove("phase-banner-closed");

    updateTimerButtonLabels();


    setFeedback("Slutfase - 10 minutter tilbage", true);
  }

  function closePhaseBanner(){
    document.body.classList.add("phase-banner-closed");
  }

  function updateTimerButtonLabels(){
    const plus = document.getElementById("plus30Btn");
    const minus = document.getElementById("minus30Btn");

    if (plus){
      plus.textContent = "+30 sek";
    }

    if (minus){
      minus.textContent = "-30 sek";
    }
  }

  function addMissionCard(mission){
    const shell = document.getElementById("mission-board-shell");
    const board = document.getElementById("mission-board");

    if (!shell || !board) return;

    shell.style.display = "flex";

    const card = document.createElement("div");
    card.className = "mission-card";

    const multiplierText = "";
    const first = formatReward(mission.rewardsMin.first);
    const second = formatReward(mission.rewardsMin.second);
    const third = formatReward(mission.rewardsMin.third);

    card.innerHTML = `
      <h3>${mission.name}</h3>
      <p><strong>Skal løses ved fast tid: ${formatSolveAt(mission)}</strong></p>
      <p>Kræver ${mission.people} personer.</p>
      <p>1. plads: +${first} minutter${multiplierText}.</p>
      <p>2. plads: +${second} minutter${multiplierText}.</p>
      <p>3. plads: +${third} minutter${multiplierText}.</p>
      <p>Øvrige placeringer: +0 minutter.</p>
    `;

    board.prepend(card);

    updateMissionCount();
  }

  function updateMissionCount(){
    const board = document.getElementById("mission-board");
    const count = document.getElementById("missionCount");

    if (!board || !count) return;

    count.textContent = board.children.length;
  }

  function toggleMissionBoard(){
    const shell = document.getElementById("mission-board-shell");
    const text = document.getElementById("missionToggleText");

    if (!shell || !text) return;

    shell.classList.toggle("collapsed");

    if (shell.classList.contains("collapsed")){
      text.textContent = "Vis missioner";
    } else {
      text.textContent = "Skjul missioner";
    }
  }

  function adjustAdjustableTimer(deltaMs){
    if (!adjustableEndAt || gameIsFinished) return;

    adjustableEndAt = Math.max(Date.now(), adjustableEndAt + deltaMs);

    renderTimers();

    const box = document.getElementById("adjustableTimerBox");

    if (box){
      box.classList.add("flash");
      setTimeout(() => box.classList.remove("flash"), 350);
    }
  }

  function applyWrongAnswerPenalty(){
    const penalty = currentWrongPenaltyMs();

    adjustAdjustableTimer(-penalty);

    setFeedback("Forkert kode – prøv igen. Straf: -30 sek.", false);
  }

  function finishGameByFixedTimer(scoreMs){
    gameIsFinished = true;

    if (timerTick){
      clearInterval(timerTick);
      timerTick = null;
    }


    const scoreText = mmss(scoreMs);

    const adjustableEl = document.getElementById("adjustableTimer");
    const fixedEl = document.getElementById("fixedTimer");

    updateActivityStatus(0);

    if (adjustableEl){
      adjustableEl.textContent = scoreText;
      adjustableEl.style.color = "var(--ok)";
    }

    if (fixedEl){
      fixedEl.textContent = "00:00";
      fixedEl.style.color = "var(--err)";
    }

    document.body.classList.remove("final-phase");

    setFeedback(`Tiden er slut. Jeres score er ${scoreText} ⏱️`, true);

    const f = document.getElementById("kode");
    const b = document.getElementById("checkBtn");
    const plus = document.getElementById("plus30Btn");
    const minus = document.getElementById("minus30Btn");

    if (f) f.disabled = true;
    if (b) b.disabled = true;
    if (plus) plus.disabled = true;
    if (minus) minus.disabled = true;
  }

  function makeDivIcon(){
    return L.divIcon({
      className: "pulse-marker",
      html: "<div class='pin'></div><div class='pulse'></div>",
      iconSize: [24,24],
      iconAnchor: [12,12]
    });
  }

  function updateProgress(){
    const pct = Math.min(100, Math.round((nextIndex / POSTS.length) * 100));
    const bar = document.getElementById("progressBar");

    if (bar){
      bar.style.width = pct + "%";
    }
  }

  function showPost(p){
    const marker = L.marker([p.lat, p.lon], { icon: makeDivIcon() })
      .addTo(gameLayer)
      .bindPopup(`<b>${p.name}</b><br><strong>Skal løses ved fast tid: ${formatSolveAt(p)}</strong><br><i>Indtast næste kode for at fortsætte…</i>`)
      .bindTooltip(p.name, {
        permanent: true,
        direction: "top",
        offset: [0, -12],
        opacity: 0.95
      })
      .openPopup();

    if (SHOW_HALO){
      L.circle([p.lat, p.lon], {
        radius: 35,
        color: "#1f7ae0",
        weight: 2,
        fillOpacity: 0.08
      }).addTo(gameLayer);
    }

    leafletMap().setView([p.lat, p.lon], 18, { animate:true });
  }

  function setFeedback(msg, ok=false){
    const el = document.getElementById("feedback");

    if (!el) return;

    el.innerHTML = `<span style="color:${ok ? "var(--ok)" : "var(--err)"}">${msg}</span>`;

    if (navigator.vibrate){
      navigator.vibrate(ok ? [60,40,60] : 120);
    }
  }

  function autoFocusMobile(el){
    if (!el) return;

    const tryFocus = () => {
      el.focus({ preventScroll: true });

      if (el.setSelectionRange){
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    };

    requestAnimationFrame(tryFocus);
    setTimeout(tryFocus, 180);
    setTimeout(tryFocus, 400);
  }

  let lastCheck = 0;

  async function checkKode(){
    if (gameIsFinished) return;

    const now = Date.now();

    if (now - lastCheck < 250) return;

    lastCheck = now;

    const field = document.getElementById("kode");
    const kode = (field.value || "").trim();

    if (!leafletMap()){
      return setFeedback("Kort ikke klar – prøv igen om et øjeblik…");
    }

    const expected = POSTS[nextIndex];

    if (!expected || kode !== expected.code){
      field.setAttribute("aria-invalid", "true");
      field.select();

      applyWrongAnswerPenalty();

      return;
    }

    field.removeAttribute("aria-invalid");

    showPost(expected);

    addMissionCard(expected);

    nextIndex = Math.min(nextIndex + 1, POSTS.length);

    updateProgress();

    setFeedback(`${expected.name} låst op ✅`, true);

    field.value = "";

    if (nextIndex === POSTS.length){
      setFeedback("Alle poster låst op – flot! 🎉", true);
      field.blur();
    } else {
      autoFocusMobile(field);
    }
  }

  function init(){
    const map = leafletMap();

    if (!map){
      return setTimeout(init, 200);
    }

    gameLayer = L.layerGroup().addTo(map);

    map.scrollWheelZoom.disable();

    if (USE_MAX_BOUNDS && Array.isArray(MAX_BOUNDS)){
      map.setMaxBounds(MAX_BOUNDS);
    }

    updateProgress();

    const input = document.getElementById("kode");
    const gate = document.getElementById("start-gate");

    if (gate && gate.style.display === "none"){
      autoFocusMobile(input);
    }
  }

  function launchGame(forceStartNow=false){
    const gate = document.getElementById("start-gate");

    if (gate){
      gate.style.display = "none";
    }

    nextIndex = 0;
    gameIsFinished = false;
    finalPhaseActive = false;
    document.body.classList.remove("final-phase");
    document.body.classList.remove("phase-banner-closed");

    const missionShell = document.getElementById("mission-board-shell");
    const missionBoard = document.getElementById("mission-board");
    const missionToggleText = document.getElementById("missionToggleText");
    const activityStatusShell = document.getElementById("activity-status-shell");
    const activityStatusToggleText = document.getElementById("activityStatusToggleText");

    if (missionBoard){
      missionBoard.innerHTML = "";
    }

    if (missionShell){
      missionShell.style.display = "none";
      missionShell.classList.remove("collapsed");
    }

    if (missionToggleText){
      missionToggleText.textContent = "Skjul missioner";
    }

    if (activityStatusShell){
      activityStatusShell.style.display = "flex";
      activityStatusShell.classList.remove("collapsed");
    }

    if (activityStatusToggleText){
      activityStatusToggleText.textContent = "Skjul status";
    }

    currentActivityStatusIndex = null;

    updateMissionCount();

    const kodeInput = document.getElementById("kode");
    const checkButton = document.getElementById("checkBtn");
    const plus = document.getElementById("plus30Btn");
    const minus = document.getElementById("minus30Btn");

    if (kodeInput) kodeInput.disabled = false;
    if (checkButton) checkButton.disabled = false;
    if (plus) plus.disabled = false;
    if (minus) minus.disabled = false;

    if (gameLayer){
      gameLayer.clearLayers();
    }

    updateProgress();

    startTimers(forceStartNow);

    autoFocusMobile(document.getElementById("kode"));
  }

  function initGate(){
    const btn = document.getElementById("startBtn");
    const inp = document.getElementById("startCode");
    const msg = document.getElementById("startMsg");

    let waitingTick = null;
    let isWaitingForScheduledStart = false;

    autoFocusMobile(inp);

    function forceStartNow(){
      if (waitingTick){
        clearInterval(waitingTick);
        waitingTick = null;
      }

      launchGame(true);
    }

    function startOrWaitUntilScheduledTime(){
      const scheduledStartAt = getScheduledStartAt();

      if (Date.now() >= scheduledStartAt){
        launchGame(false);
        return;
      }

      isWaitingForScheduledStart = true;

      if (btn) btn.textContent = "Start nu / overrule";
      if (inp){
        inp.disabled = false;
        inp.value = "";
        inp.placeholder = "Skriv Start igen for at starte nu";
      }

      function updateWaitingMessage(){
        const left = scheduledStartAt - Date.now();

        if (left <= 0){
          if (waitingTick){
            clearInterval(waitingTick);
            waitingTick = null;
          }

          launchGame(false);
          return;
        }

        if (msg){
          msg.style.color = "var(--ok)";
          msg.textContent = `Korrekt kode. Løbet starter automatisk kl. ${formatStartClock()} – om ${formatCountdown(left)}. Skriv Start igen for at starte nu/teste.`;
        }
      }

      updateWaitingMessage();

      if (!waitingTick){
        waitingTick = setInterval(updateWaitingMessage, 250);
      }

      autoFocusMobile(inp);
    }

    function openIfValid(){
      if ((inp.value || "").trim().toLowerCase() === START_CODE.toLowerCase()){
        if (isWaitingForScheduledStart){
          forceStartNow();
        } else {
          startOrWaitUntilScheduledTime();
        }
      } else {
        msg.style.color = "var(--err)";
        msg.textContent = "Forkert startkode.";
        autoFocusMobile(inp);
      }
    }

    btn.addEventListener("click", openIfValid);

    inp.addEventListener("keydown", e => {
      if (e.key === "Enter"){
        openIfValid();
      }
    });

    document.getElementById("start-gate").addEventListener("touchstart", () => autoFocusMobile(inp));
  }

  document.addEventListener("DOMContentLoaded", () => {
    const checkBtn = document.getElementById("checkBtn");
    const kode = document.getElementById("kode");

    const plus30Btn = document.getElementById("plus30Btn");
    const minus30Btn = document.getElementById("minus30Btn");
    const closePhaseBannerBtn = document.getElementById("closePhaseBannerBtn");
    const missionToggleBtn = document.getElementById("missionToggleBtn");
    const activityStatusToggleBtn = document.getElementById("activityStatusToggleBtn");

    if (checkBtn){
      checkBtn.addEventListener("click", checkKode);
    }

    if (kode){
      kode.addEventListener("keydown", e => {
        if (e.key === "Enter"){
          e.preventDefault();
          checkKode();
        }
      });
    }

    if (plus30Btn){
      plus30Btn.addEventListener("click", () => adjustAdjustableTimer(currentAdjustmentMs()));
    }

    if (minus30Btn){
      minus30Btn.addEventListener("click", () => adjustAdjustableTimer(-currentAdjustmentMs()));
    }

    if (closePhaseBannerBtn){
      closePhaseBannerBtn.addEventListener("click", closePhaseBanner);
    }

    if (missionToggleBtn){
      missionToggleBtn.addEventListener("click", toggleMissionBoard);
    }

    if (activityStatusToggleBtn){
      activityStatusToggleBtn.addEventListener("click", toggleActivityStatus);
    }

    initGate();
    init();
  });
</script>
